<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEO Site Kit — UI Kit Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../colors_and_type.css">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Roboto', sans-serif; background: #FDFCFF; color: #1C1B1F; }

/* Layout */
.site-container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }

/* Sticky header */
.site-header {
  position: sticky; top: 0; z-index: 100;
  background: #FDFCFF; transition: box-shadow 250ms, height 250ms;
  height: 80px; display: flex; align-items: center;
}
.site-header.scrolled {
  height: 64px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
}
.header-inner {
  display: flex; align-items: center; gap: 0; width: 100%;
}
.header-logo {
  font-size: 20px; font-weight: 500; color: #1C1B1F;
  text-decoration: none; white-space: nowrap; margin-right: 32px;
}
.header-logo span { color: #1565C0; }
.header-nav { display: flex; gap: 2px; flex: 1; }
.nav-link {
  padding: 8px 14px; border-radius: 9999px; font-size: 14px; font-weight: 500;
  color: #49454F; cursor: pointer; text-decoration: none;
  transition: background 150ms, color 150ms; white-space: nowrap;
}
.nav-link:hover { background: rgba(21,101,192,0.08); color: #1565C0; }
.nav-link.active { color: #1565C0; background: #D3E4FF; }

.header-actions { display: flex; gap: 6px; align-items: center; }
.icon-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: transparent; cursor: pointer; display: flex;
  align-items: center; justify-content: center; color: #49454F;
  transition: background 150ms;
}
.icon-btn:hover { background: rgba(0,0,0,0.08); }
.header-cta {
  background: #1565C0; color: #fff; border: none;
  padding: 10px 20px; border-radius: 9999px;
  font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; white-space: nowrap; transition: box-shadow 150ms;
}
.header-cta:hover {
  box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
}

/* Breadcrumbs */
.breadcrumbs {
  display: flex; align-items: center; gap: 2px;
  padding: 12px 0; font-size: 12px; color: #79747E; flex-wrap: wrap;
}
.bc-link { color: #1565C0; text-decoration: none; }
.bc-link:hover { text-decoration: underline; }

/* Article layout */
.article-layout {
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 48px; align-items: flex-start;
  padding: 24px 0 64px;
}
@media (max-width: 1024px) {
  .article-layout { grid-template-columns: 1fr; }
  .article-sidebar { display: none; }
}

/* Article */
.article-meta {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  margin-bottom: 16px;
}
.meta-tag {
  display: inline-flex; align-items: center; gap: 4px;
  background: #D3E4FF; color: #001D36;
  border-radius: 8px; padding: 4px 10px;
  font-size: 12px; font-weight: 500; letter-spacing: 0.5px;
}
.meta-date { font-size: 12px; color: #79747E; }
.meta-read { font-size: 12px; color: #79747E; }
.meta-sep { color: #CAC4D0; }

.article-h1 {
  font-size: 32px; font-weight: 400; line-height: 40px;
  color: #1C1B1F; margin-bottom: 16px;
}
.article-lead {
  font-size: 18px; line-height: 28px; color: #49454F;
  margin-bottom: 32px; font-weight: 300;
}
.article-img {
  width: 100%; border-radius: 12px;
  background: linear-gradient(135deg, #D3E4FF 0%, #E8DFFF 100%);
  height: 360px; display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px; color: #49454F; font-size: 14px;
  flex-direction: column; gap: 8px;
}
.article-img-label { font-size: 12px; color: #79747E; text-align: center; margin-top: 8px; }

/* Prose */
.prose h2 {
  font-size: 24px; font-weight: 400; line-height: 32px;
  color: #1C1B1F; margin: 40px 0 16px; scroll-margin-top: 90px;
}
.prose h3 {
  font-size: 20px; font-weight: 500; line-height: 28px;
  color: #1C1B1F; margin: 28px 0 12px;
}
.prose p {
  font-size: 16px; line-height: 26px; color: #49454F;
  margin-bottom: 16px; letter-spacing: 0.3px;
}
.prose ul {
  padding-left: 24px; margin-bottom: 16px;
}
.prose ul li {
  font-size: 16px; line-height: 26px; color: #49454F; margin-bottom: 8px;
}
.prose blockquote {
  margin: 24px 0; padding: 16px 20px;
  border-left: 4px solid #1565C0;
  background: #F2EFF6;
  border-radius: 0 8px 8px 0;
  font-size: 16px; font-style: italic;
  line-height: 26px; color: #49454F;
}
.prose blockquote cite {
  display: block; margin-top: 8px; font-size: 13px;
  font-style: normal; font-weight: 500; color: #79747E;
}

/* Callout */
.callout {
  border-radius: 8px; padding: 16px 20px; margin: 24px 0;
  display: flex; gap: 12px; align-items: flex-start;
  font-size: 14px; line-height: 22px;
}
.callout-info    { background: #D3E4FF; color: #001D36; }
.callout-warning { background: #FFF0C2; color: #201A00; }
.callout-success { background: #C8F0D8; color: #002114; }

/* Share */
.share-block {
  border-top: 1px solid #CAC4D0; padding-top: 24px; margin-top: 40px;
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
}
.share-label { font-size: 14px; font-weight: 500; color: #49454F; }
.share-btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 16px; border-radius: 9999px; border: 1px solid #CAC4D0;
  background: transparent; font-size: 13px; font-weight: 500; color: #49454F;
  cursor: pointer; transition: background 150ms;
}
.share-btn:hover { background: #F2EFF6; }

/* Author block */
.author-block {
  border-radius: 12px; border: 1px solid #CAC4D0;
  padding: 20px 24px; margin: 32px 0;
  display: flex; gap: 16px; align-items: flex-start;
}
.author-avatar {
  width: 48px; height: 48px; border-radius: 50%;
  background: #D3E4FF; display: flex; align-items: center; justify-content: center;
  color: #1565C0; font-size: 20px; font-weight: 500; flex-shrink: 0;
}
.author-name { font-size: 14px; font-weight: 500; color: #1C1B1F; }
.author-role { font-size: 12px; color: #79747E; margin-bottom: 6px; }
.author-bio  { font-size: 13px; line-height: 20px; color: #49454F; }

/* Related articles */
.related-title {
  font-size: 22px; font-weight: 400; color: #1C1B1F; margin-bottom: 20px;
}
.related-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
@media (max-width: 900px) { .related-grid { grid-template-columns: 1fr; } }
.article-card {
  border-radius: 12px; border: 1px solid #CAC4D0; overflow: hidden;
  cursor: pointer; transition: box-shadow 200ms;
  background: #FDFCFF;
}
.article-card:hover {
  box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15);
}
.article-card-img {
  height: 140px; background: linear-gradient(135deg, #D3E4FF, #E8DFFF);
  display: flex; align-items: center; justify-content: center;
  color: #49454F; font-size: 12px;
}
.article-card-body { padding: 16px; }
.article-card-tag {
  display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: 0.5px;
  color: #1565C0; margin-bottom: 6px;
}
.article-card-title {
  font-size: 15px; font-weight: 500; line-height: 22px; color: #1C1B1F;
  margin-bottom: 6px;
}
.article-card-date { font-size: 11px; color: #79747E; }

/* Sidebar */
.article-sidebar { position: sticky; top: 88px; }
.toc-card {
  background: #F2EFF6; border-radius: 12px; padding: 20px; margin-bottom: 16px;
}
.toc-title {
  font-size: 12px; font-weight: 500; letter-spacing: 0.5px; color: #79747E;
  text-transform: uppercase; margin-bottom: 12px;
}
.toc-link {
  display: block; font-size: 13px; line-height: 20px; color: #49454F;
  text-decoration: none; padding: 4px 0; border-left: 2px solid transparent;
  padding-left: 10px; margin-left: -12px; transition: color 150ms, border-color 150ms;
}
.toc-link:hover { color: #1565C0; border-left-color: #1565C0; }
.toc-link.active { color: #1565C0; border-left-color: #1565C0; font-weight: 500; }
.toc-link.toc-h3 { margin-left: 4px; font-size: 12px; }

/* FAQ Accordion */
.faq-title { font-size: 22px; font-weight: 400; color: #1C1B1F; margin-bottom: 16px; }
.accordion-item { border-bottom: 1px solid #CAC4D0; }
.accordion-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 0; cursor: pointer; font-size: 15px; font-weight: 500;
  color: #1C1B1F; gap: 12px; user-select: none;
}
.accordion-head:hover { color: #1565C0; }
.accordion-body { font-size: 14px; line-height: 22px; color: #49454F; padding-bottom: 16px; }

/* Footer */
.site-footer {
  background: #1C1B1F; color: #E6E1E5;
  padding: 48px 0 24px;
}
.footer-grid {
  display: grid; grid-template-columns: 2fr 1fr 1fr 1fr;
  gap: 40px; margin-bottom: 40px;
}
@media (max-width: 768px) {
  .footer-grid { grid-template-columns: 1fr 1fr; }
}
.footer-logo { font-size: 20px; font-weight: 500; color: #fff; margin-bottom: 12px; }
.footer-logo span { color: #9EC4F8; }
.footer-tagline { font-size: 13px; line-height: 20px; color: #938F94; margin-bottom: 20px; }
.footer-col-title { font-size: 12px; font-weight: 500; letter-spacing: 0.5px; color: #938F94; text-transform: uppercase; margin-bottom: 12px; }
.footer-link { display: block; font-size: 13px; color: #AEAAAF; text-decoration: none; margin-bottom: 8px; transition: color 150ms; }
.footer-link:hover { color: #fff; }
.footer-bottom {
  border-top: 1px solid #48464C; padding-top: 20px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 12px; color: #605D64; flex-wrap: wrap; gap: 8px;
}

/* Cookie banner */
.cookie-banner {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  background: #313033; color: #F5EFF7; border-radius: 12px;
  padding: 16px 20px; max-width: 560px; width: calc(100% - 32px);
  box-shadow: 0 8px 12px 6px rgba(0,0,0,0.15), 0 4px 4px rgba(0,0,0,0.3);
  display: flex; align-items: flex-start; gap: 16px;
  z-index: 200; transition: opacity 300ms, transform 300ms;
}
.cookie-text { font-size: 13px; line-height: 20px; flex: 1; }
.cookie-text a { color: #9EC4F8; }
.cookie-actions { display: flex; gap: 8px; flex-shrink: 0; }
.cookie-btn {
  padding: 8px 16px; border-radius: 9999px; font-family: 'Roboto', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; border: none; white-space: nowrap;
}
.cookie-btn-accept { background: #9EC4F8; color: #001D36; }
.cookie-btn-reject { background: transparent; color: #CAC4D0; border: 1px solid #605D64; }
.cookie-hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(16px); }

/* Snackbar */
.snackbar-container {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 300; pointer-events: none;
}
.snackbar {
  background: #313033; color: #F5EFF7; border-radius: 4px;
  padding: 14px 16px; display: flex; align-items: center; gap: 16px;
  box-shadow: 0 4px 8px 3px rgba(0,0,0,0.15), 0 1px 3px rgba(0,0,0,0.3);
  font-size: 14px; white-space: nowrap; pointer-events: all;
  animation: snackSlide 300ms ease;
}
@keyframes snackSlide { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }
.snackbar-action { color: #9EC4F8; font-weight: 500; cursor: pointer; background: none; border: none; font-family: 'Roboto', sans-serif; font-size: 14px; }

/* Rating */
.rating { display: flex; gap: 2px; }
.star { font-size: 18px; color: #F59E0B; }

/* Screen selector tabs at top */
.screen-selector {
  background: #E1DEE9; padding: 8px 24px;
  display: flex; gap: 4px; overflow-x: auto;
}
.screen-tab {
  padding: 6px 16px; border-radius: 9999px; font-size: 13px; font-weight: 500;
  color: #49454F; cursor: pointer; white-space: nowrap; border: none;
  background: transparent; font-family: 'Roboto', sans-serif; transition: background 150ms;
}
.screen-tab.active { background: #1565C0; color: #fff; }
.screen-tab:hover:not(.active) { background: rgba(0,0,0,0.08); }

/* Hero */
.hero { padding: 80px 0; }
.hero-centered { text-align: center; max-width: 720px; margin: 0 auto; }
.hero-eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 1px; color: #1565C0; text-transform: uppercase; margin-bottom: 16px; }
.hero-h1 { font-size: 48px; font-weight: 400; line-height: 56px; color: #1C1B1F; margin-bottom: 20px; }
.hero-lead { font-size: 18px; line-height: 28px; color: #49454F; margin-bottom: 32px; }
.hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-filled { background: #1565C0; color: #fff; border: none; padding: 14px 28px; border-radius: 9999px; font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: box-shadow 150ms; }
.btn-filled:hover { box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 2px 6px 2px rgba(0,0,0,0.15); }
.btn-outlined { background: transparent; color: #1565C0; border: 1px solid #79747E; padding: 14px 28px; border-radius: 9999px; font-family: 'Roboto', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
.btn-outlined:hover { background: rgba(21,101,192,0.05); }

/* Features */
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; padding: 64px 0; }
@media (max-width: 768px) { .features-grid { grid-template-columns: 1fr; } }
.feature-card { background: #F2EFF6; border-radius: 12px; padding: 28px 24px; }
.feature-icon { width: 48px; height: 48px; background: #D3E4FF; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: #1565C0; margin-bottom: 16px; }
.feature-title { font-size: 18px; font-weight: 500; color: #1C1B1F; margin-bottom: 8px; }
.feature-body { font-size: 14px; line-height: 22px; color: #49454F; }

/* Section header */
.section-label { font-size: 12px; font-weight: 500; letter-spacing: 1px; color: #1565C0; text-transform: uppercase; margin-bottom: 8px; }
.section-title { font-size: 32px; font-weight: 400; line-height: 40px; color: #1C1B1F; margin-bottom: 12px; }
.section-subtitle { font-size: 16px; line-height: 26px; color: #49454F; max-width: 560px; margin-bottom: 40px; }

/* Stats */
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; padding: 48px 0; }
@media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
.stat-item { text-align: center; }
.stat-number { font-size: 40px; font-weight: 400; color: #1565C0; line-height: 1; margin-bottom: 8px; }
.stat-label { font-size: 14px; color: #49454F; }

/* Testimonials */
.testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 900px) { .testi-grid { grid-template-columns: 1fr; } }
.testi-card { background: #FDFCFF; border: 1px solid #CAC4D0; border-radius: 12px; padding: 24px; }
.testi-quote { font-size: 15px; line-height: 24px; color: #49454F; margin-bottom: 16px; font-style: italic; }
.testi-author { display: flex; align-items: center; gap: 12px; }
.testi-avatar { width: 40px; height: 40px; border-radius: 50%; background: #D3E4FF; display: flex; align-items: center; justify-content: center; font-weight: 500; color: #1565C0; flex-shrink: 0; }
.testi-name { font-size: 14px; font-weight: 500; color: #1C1B1F; }
.testi-role { font-size: 12px; color: #79747E; }

/* Contact form */
.contact-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; }
@media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 500; letter-spacing: 0.5px; color: #49454F; display: block; margin-bottom: 6px; }
.form-input {
  width: 100%; padding: 14px 16px; border: 1px solid #79747E; border-radius: 4px;
  font-family: 'Roboto', sans-serif; font-size: 15px; color: #1C1B1F;
  background: transparent; outline: none; transition: border-color 150ms;
}
.form-input:focus { border: 2px solid #1565C0; }
.form-textarea { resize: vertical; min-height: 120px; }
.contact-info-item { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 20px; color: #49454F; font-size: 14px; line-height: 22px; }

/* Blog listing */
.blog-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.filter-chip {
  padding: 6px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  cursor: pointer; border: 1px solid #CAC4D0; background: #FDFCFF; color: #49454F;
  transition: background 150ms;
}
.filter-chip.active { background: #D3E4FF; border-color: transparent; color: #001D36; }
.filter-chip:hover:not(.active) { background: #F2EFF6; }
.blog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
@media (max-width: 900px) { .blog-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── Icon ───────────────────────────────
function Icon({ name, size = 24, style = {} }) {
  return <span className="material-symbols-outlined" style={{ fontSize: size, ...style }}>{name}</span>;
}

// ─── Header ─────────────────────────────
function Header({ activePage, onNav }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 10);
    window.addEventListener('scroll', onScroll);
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const pages = [
    { id: 'article', label: 'Статьи' },
    { id: 'home', label: 'Главная' },
    { id: 'blog', label: 'Блог' },
    { id: 'contact', label: 'Контакты' },
  ];
  return (
    <header className={`site-header ${scrolled ? 'scrolled' : ''}`}>
      <div className="site-container">
        <div className="header-inner">
          <a className="header-logo" href="#" onClick={e => { e.preventDefault(); onNav('home'); }}>SEO<span>Kit</span></a>
          <nav className="header-nav">
            {pages.map(p => (
              <a key={p.id} className={`nav-link ${activePage === p.id ? 'active' : ''}`}
                href="#" onClick={e => { e.preventDefault(); onNav(p.id); }}>
                {p.label}
              </a>
            ))}
          </nav>
          <div className="header-actions">
            <button className="icon-btn"><Icon name="search" /></button>
            <button className="icon-btn"><Icon name="translate" /></button>
            <button className="header-cta" onClick={() => onNav('contact')}>Связаться</button>
          </div>
        </div>
      </div>
    </header>
  );
}

// ─── Footer ─────────────────────────────
function Footer() {
  return (
    <footer className="site-footer">
      <div className="site-container">
        <div className="footer-grid">
          <div>
            <div className="footer-logo">SEO<span>Kit</span></div>
            <div className="footer-tagline">MD3 компоненты для контентных сайтов. Next.js 15, Vite + React, WordPress.</div>
          </div>
          <div>
            <div className="footer-col-title">Продукт</div>
            <a className="footer-link" href="#">Компоненты</a>
            <a className="footer-link" href="#">Шаблоны страниц</a>
            <a className="footer-link" href="#">Блоки</a>
            <a className="footer-link" href="#">Цены</a>
          </div>
          <div>
            <div className="footer-col-title">Документация</div>
            <a className="footer-link" href="#">Начало работы</a>
            <a className="footer-link" href="#">Токены дизайна</a>
            <a className="footer-link" href="#">API компонентов</a>
            <a className="footer-link" href="#">Changelog</a>
          </div>
          <div>
            <div className="footer-col-title">Компания</div>
            <a className="footer-link" href="#">О нас</a>
            <a className="footer-link" href="#">Кейсы</a>
            <a className="footer-link" href="#">Контакты</a>
          </div>
        </div>

// ─── Cookie Banner ───────────────────────
function CookieBanner() {
  const [hidden, setHidden] = useState(false);
  useEffect(() => {
    if (localStorage.getItem('cookie_consent')) setHidden(true);
  }, []);
  function accept() {
    localStorage.setItem('cookie_consent', '1');
    setHidden(true);
  }
  return (
    <div className={`cookie-banner ${hidden ? 'cookie-hidden' : ''}`}>
      <div className="cookie-text">
        Мы используем файлы cookie для улучшения работы сайта.{' '}
        <a href="#">Подробнее</a>
      </div>
      <div className="cookie-actions">
        <button className="cookie-btn cookie-btn-reject" onClick={() => setHidden(true)}>Отклонить</button>
        <button className="cookie-btn cookie-btn-accept" onClick={accept}>Принять</button>
      </div>
    </div>
  );
}

// ─── Snackbar ────────────────────────────
function Snackbar({ msg, onDismiss }) {
  useEffect(() => {
    if (!msg) return;
    const t = setTimeout(onDismiss, 3500);
    return () => clearTimeout(t);
  }, [msg]);
  if (!msg) return null;
  return (
    <div className="snackbar-container">
      <div className="snackbar">
        {msg}
        <button className="snackbar-action" onClick={onDismiss}>Скрыть</button>
      </div>
    </div>
  );
}

function App() {

  function navigate(p) {
    setPage(p);
    localStorage.setItem('demo_page', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function onSnack(msg) { setSnack(msg); }

  const screens = { article: ArticlePage, home: HomePage, blog: BlogPage, contact: ContactPage };
  const Screen = screens[page] || ArticlePage;

  return (
    <>
      <div className="screen-selector">
        {[
          { id: 'article', label: 'Статья' },
          { id: 'home', label: 'Главная' },
          { id: 'blog', label: 'Блог' },
          { id: 'contact', label: 'Контакты' },
        ].map(s => (
          <button key={s.id} className={`screen-tab ${page === s.id ? 'active' : ''}`}
            onClick={() => navigate(s.id)}>{s.label}</button>
        ))}
      </div>
      <Header activePage={page} onNav={navigate} />
      <Screen onNav={navigate} onSnack={onSnack} />
      <Footer />
      <CookieBanner />
      <Snackbar msg={snack} onDismiss={() => setSnack('')} />
    </>
  );
}
