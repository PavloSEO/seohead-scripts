<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; background: #FDFCFF; font-family: 'Roboto', sans-serif; }

  /* Header */
  .header {
    position: sticky; top: 0; z-index: 10;
    background: #FDFCFF;
    box-shadow: 0 1px 2px rgba(0,0,0,0.3), 0 1px 3px 1px rgba(0,0,0,0.15);
    padding: 0 24px;
    display: flex; align-items: center; gap: 24px; height: 64px;
  }
  .header-logo { font-size: 20px; font-weight: 500; color: #1C1B1F; letter-spacing: 0; white-space: nowrap; }
  .header-logo span { color: #1565C0; }
  .header-nav { display: flex; gap: 4px; flex: 1; }
  .nav-item { padding: 8px 12px; border-radius: 9999px; font-size: 14px; font-weight: 500; color: #49454F; cursor: pointer; text-decoration: none; transition: background 150ms; white-space: nowrap; }
  .nav-item:hover { background: rgba(21,101,192,0.08); color: #1565C0; }
  .nav-item.active { color: #1565C0; background: #D3E4FF; }
  .header-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { width: 40px; height: 40px; border-radius: 50%; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #49454F; transition: background 150ms; }
  .icon-btn:hover { background: rgba(0,0,0,0.08); }
  .header-cta { background: #1565C0; color: #fff; border: none; padding: 10px 20px; border-radius: 9999px; font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }

  /* Breadcrumbs */
  .breadcrumbs { display: flex; align-items: center; gap: 4px; padding: 12px 24px; font-size: 12px; color: #79747E; }
  .bc-link { color: #1565C0; text-decoration: none; }
  .bc-link:hover { text-decoration: underline; }
  .bc-sep { color: #CAC4D0; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 1px solid #CAC4D0; padding: 0 24px; }
  .tab { padding: 14px 16px; font-size: 14px; font-weight: 500; color: #49454F; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 150ms; }
  .tab.active { color: #1565C0; border-bottom-color: #1565C0; }
  .tab:hover { color: #1565C0; background: rgba(21,101,192,0.05); }

  /* Pagination */
  .pagination { display: flex; gap: 4px; align-items: center; padding: 16px 24px; }
  .page-btn { width: 36px; height: 36px; border-radius: 9999px; border: none; background: transparent; font-family: 'Roboto', sans-serif; font-size: 14px; font-weight: 500; color: #49454F; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 150ms; }
  .page-btn:hover { background: rgba(0,0,0,0.08); }
  .page-btn.active { background: #1565C0; color: #fff; }
  .page-btn.icon-pg { color: #49454F; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-logo">SEO<span>Kit</span></div>
  <nav class="header-nav">
    <a class="nav-item active" href="#">Услуги</a>
    <a class="nav-item" href="#">Кейсы</a>
    <a class="nav-item" href="#">Статьи</a>
    <a class="nav-item" href="#">Цены</a>
    <a class="nav-item" href="#">О нас</a>
  </nav>
  <div class="header-actions">
    <button class="icon-btn"><span class="material-symbols-outlined">search</span></button>
    <button class="icon-btn"><span class="material-symbols-outlined">translate</span></button>
    <button class="header-cta">Связаться</button>
  </div>
</div>

<!-- Breadcrumbs -->
<div class="breadcrumbs">
  <a class="bc-link" href="#">Главная</a>
  <span class="bc-sep"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">chevron_right</span></span>
  <a class="bc-link" href="#">Статьи</a>
  <span class="bc-sep"><span class="material-symbols-outlined" style="font-size:16px;vertical-align:middle">chevron_right</span></span>
  <span style="color:#1C1B1F">Технический SEO-аудит</span>
</div>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active">Описание</div>
  <div class="tab">Характеристики</div>
  <div class="tab">Отзывы</div>
  <div class="tab">Вопросы и ответы</div>
</div>

<!-- Pagination -->
<div class="pagination">
  <button class="page-btn icon-pg"><span class="material-symbols-outlined">chevron_left</span></button>
  <button class="page-btn active">1</button>
  <button class="page-btn">2</button>
  <button class="page-btn">3</button>
  <span style="padding:0 4px;color:#79747E;font-size:14px">…</span>
  <button class="page-btn">12</button>
  <button class="page-btn icon-pg"><span class="material-symbols-outlined">chevron_right</span></button>
</div>

</body>
</html>
